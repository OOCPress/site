<aside class="search-panel" data-search-panel data-pagefind-ignore aria-hidden="true">
  <div class="search-panel__backdrop" data-search-close></div>
  <section class="search-panel__dialog" role="dialog" aria-modal="true" aria-labelledby="search-title">
    <div class="search-panel__header">
      <h2 id="search-title">Search the site</h2>
      <button type="button" class="icon-button" data-search-close aria-label="Close search">×</button>
    </div>
    <form class="search-form" action="{{ '/en/search/' | relative_url }}" role="search">
      <label for="site-search">Search</label>
      <input id="site-search" name="q" type="search" placeholder="Try context collapse, conflict infrastructure, AI formation" data-search-input>
    </form>
    <div class="search-results" data-search-results>
      <p>Search becomes available after the Pagefind build step.</p>
    </div>
  </section>
</aside>
