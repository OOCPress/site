---
layout: default
---
<article class="page page--detail" data-pagefind-filter="type:Framework">
  <header class="page-header">
    <p class="kicker">Framework</p>
    <h1 data-pagefind-meta="title">{{ page.title }}</h1>
    <p class="page-header__lede" data-pagefind-meta="summary">{{ page.subtitle }}</p>
    {% if page.repair %}<p class="detail-meta">Repairs: {{ page.repair }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
  <nav class="detail-nav" aria-label="Framework navigation">
    <a href="{{ '/en/frameworks/' | relative_url }}">All frameworks</a>
    <a href="{{ '/en/companion-library/' | relative_url }}">Companion library</a>
  </nav>
</article>
