---
layout: default
---
<article class="page page--detail" data-pagefind-filter="type:Companion">
  <header class="page-header">
    <p class="kicker">Companion</p>
    <h1 data-pagefind-meta="title">{{ page.title }}</h1>
    <p class="page-header__lede" data-pagefind-meta="summary">{{ page.subtitle }}</p>
    <p class="detail-meta">
      {% include status-badge.html status=page.status %}
      {% if page.version %}<span>Version {{ page.version }}</span>{% endif %}
      {% if page.formats %}<span>{{ page.formats | join: ', ' }}</span>{% endif %}
    </p>
  </header>
  <div class="prose">
    {{ content }}
  </div>
  <nav class="detail-nav" aria-label="Companion navigation">
    <a href="{{ '/en/companion-library/' | relative_url }}">All companions</a>
    <a href="{{ '/en/sources/' | relative_url }}">Sources and updates</a>
  </nav>
</article>
