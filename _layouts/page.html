---
layout: default
---
<article class="page">
  <header class="page-header">
    {% if page.kicker %}<p class="kicker">{{ page.kicker }}</p>{% endif %}
    <h1 data-pagefind-meta="title">{{ page.title }}</h1>
    {% if page.description %}<p class="page-header__lede" data-pagefind-meta="summary">{{ page.description }}</p>{% endif %}
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</article>
